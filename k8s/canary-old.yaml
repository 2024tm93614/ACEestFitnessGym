apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary-old
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-canary
      version: v1
  template:
    metadata:
      labels:
        app: aceest-canary
        version: v1
    spec:
      containers:
      - name: aceest-container
        image: 2024tm93614/aceest-devops-app:canary-v1
        ports:
        - containerPort: 5000