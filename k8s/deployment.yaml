apiVersion: apps/v1
kind: Deployment
metadata:
 name: aceest-app
spec:
 replicas: 2
 selector:
   matchLabels:
     app: aceest
 template:
   metadata:
     labels:
       app: aceest
   spec:
     containers:
     - name: aceest-container
       image: 2024tm93614/aceest-devops-app:v1
       ports:
       - containerPort: 5000
